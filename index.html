<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freedom Code — 30-Day Course Hub</title>
<link rel="stylesheet" href="fc-interactive.css">
<style>
  body { padding-top: 0; }

  .hub-header {
    text-align: center;
    padding: 60px 20px 40px;
    background: rgba(15,15,30,0.9);
    border-bottom: 1px solid rgba(200,160,69,0.15);
  }

  .hub-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--fc-gold);
    margin-bottom: 4px;
  }

  .hub-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--fc-text);
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .hub-subtitle {
    font-size: 16px;
    color: var(--fc-text-muted);
    max-width: 460px;
    margin: 0 auto 24px;
  }

  /* Overall progress */
  .hub-progress {
    max-width: 400px;
    margin: 0 auto;
  }

  .hub-progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hub-progress-track {
    flex: 1;
    height: 10px;
    background: rgba(0,0,0,0.06);
    border-radius: 5px;
    overflow: hidden;
  }

  .hub-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--fc-gold), var(--fc-gold-light));
    border-radius: 5px;
    transition: width 0.6s;
    width: 0%;
  }

  .hub-progress-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--fc-gold);
    min-width: 40px;
    text-align: right;
  }

  .hub-stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 16px;
  }

  .hub-stat {
    text-align: center;
  }

  .hub-stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--fc-gold);
  }

  .hub-stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fc-text-light);
    font-weight: 500;
  }

  /* Phase sections */
  .hub-phase {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 20px;
  }

  .hub-phase-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--fc-gold);
    margin-bottom: 16px;
    padding-left: 4px;
  }

  /* Day grid */
  .hub-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .hub-day-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 12px;
    border-radius: var(--fc-radius);
    border: 1px solid rgba(200,160,69,0.2);
    background: rgba(15,15,30,0.8);
    text-decoration: none;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    min-height: 110px;
  }

  .hub-day-card:hover {
    border-color: var(--fc-gold-border);
    box-shadow: var(--fc-shadow);
    transform: translateY(-2px);
  }

  .hub-day-card.current {
    border-color: var(--fc-gold);
    background: var(--fc-gold-bg);
    box-shadow: 0 0 0 3px rgba(184,148,60,0.1);
  }

  .hub-day-card.completed {
    border-color: var(--fc-gold);
    background: linear-gradient(135deg, rgba(184,148,60,0.04), rgba(184,148,60,0.08));
  }

  .hub-day-card.locked {
    opacity: 0.45;
    pointer-events: none;
  }

  .hub-day-num {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--fc-text-light);
    margin-bottom: 4px;
  }

  .hub-day-card.current .hub-day-num {
    color: var(--fc-gold);
  }

  .hub-day-title {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    color: var(--fc-text);
    text-align: center;
    line-height: 1.3;
  }

  .hub-day-check {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--fc-gold);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hub-day-check svg {
    width: 12px;
    height: 12px;
    stroke: var(--fc-white);
    stroke-width: 3;
    fill: none;
  }

  .hub-day-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    font-size: 10px;
    color: var(--fc-gold);
    font-weight: 600;
  }

  /* Footer */
  .hub-footer {
    text-align: center;
    padding: 40px 20px 60px;
    border-top: 1px solid rgba(200,160,69,0.15);
    background: rgba(15,15,30,0.9);
  }

  .hub-footer p {
    color: var(--fc-text-light);
    font-size: 13px;
    margin-bottom: 6px;
  }

  .hub-footer a {
    color: var(--fc-gold);
    text-decoration: none;
  }

  @media (max-width: 500px) {
    .hub-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .hub-day-card { min-height: 95px; padding: 16px 10px; }
    .hub-day-title { font-size: 13px; }
    .hub-stats { gap: 20px; }
  }
</style>
<script src="./fc-auth.js"></script>
</head>
